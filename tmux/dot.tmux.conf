
# C-Space: Ctrl-Space
# M-Space: Alt-Space
# S-Space: Shift-Space
# C-S-Space: Ctlr-Shift-Space
# Original: C-b
set -g prefix C-Space
bind C-Space send-prefix
unbind C-b


# split/panes: keep the current directory
bind -  split-window -v -c "#{pane_current_path}"
bind \= split-window -h -c "#{pane_current_path}" # '=' is '+'

# Behavior
set -g mouse on
set -g mode-keys vi
set -g status-keys vi

# Layout
#   Status bar | Windows | Panes
set -g status-style    bg=blue
set -g status-position bottom

set -g window-status-current-style 'underscore'

set -g pane-active-border-style fg=green
set -g pane-border-style        fg=red
set -g pane-border-status       top
#et -g pane-border-format       '#[bold]#{pane-title}#[default]'
